<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Diário · Edmilson · Fernanda Hack</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F5F0E8;font-family:Georgia,serif}
input,textarea,button{font-family:Georgia,serif}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:#F5F0E8}
::-webkit-scrollbar-thumb{background:#D9D3C5;border-radius:4px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState} = React;
const STORAGE_KEY = "diario_edmilson_v2";
const SHEETS_URL = "https://script.google.com/macros/s/AKfycbxTZ4wp48xmhAU6Oj5kurCTwGhuDpsHWZuIGd8C-FDe8JU8_Tsp4-ELVkG5GeO1pU77/exec";
const C = {bg:"#F5F0E8",bgCard:"#EDEAE0",bgDark:"#1a1a1a",border:"#D9D3C5",text:"#1a1a1a",textMid:"#5a5248",textSoft:"#9a9188",accent:"#6B8C6B",accentSoft:"#8fad8f",copper:"#8B5E3C",green0:"#4a7a4a",amber:"#c08040",red:"#b04040",white:"#ffffff"};
const defManha = {dorAcordar:null,dorAcordarObs:"",rigidez:null,rigidezObs:"",localPior:[],localPiorObs:"",ajudouMelhorar:[],ajudouMelhorarObs:""};
const defNoite = {tempoSentado:null,tempoSentadoObs:"",movimentacao:null,movimentacaoObs:"",atividade:[],atividadeObs:"",dorAposMov:null,dorAposMovObs:"",medoTravar:null,medoSituacao:"",medoTravarObs:"",dificuldade:[],dificuldadeObs:"",dorFimDia:null,dorFimDiaObs:"",esqueceuDor:null,esqueceuFazendo:"",esqueceuDorObs:"",melhorPorMais:"",observacoes:""};
const locais=["Lombar","Quadril direito","Quadril esquerdo","Pescoço","Corpo todo","Outro"];
const ajudas=["Levantar da cama","Caminhar","Alongamento","Café","Banho quente","Exercício","Tempo","Outro"];
const atividades=["Caminhada","Pilates","Fortalecimento","Beach tênis","Vôlei","Não fiz"];
const dificuldades=["Colocar calçado","Pegar algo no chão","Entrar/sair do carro","Levantar da cadeira","Nenhuma"];

function loadData(){try{const r=localStorage.getItem(STORAGE_KEY);return r?JSON.parse(r):{}}catch{return{}}}
function saveData(d){localStorage.setItem(STORAGE_KEY,JSON.stringify(d))}
function todayKey(){return new Date().toISOString().slice(0,10)}
function formatDate(k){const[y,m,d]=k.split("-");return`${d}/${m}/${y}`}

function PainScale({value,onChange}){
  return <div style={{marginTop:10}}>
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
      <span style={{color:C.textSoft,fontSize:11,fontStyle:"italic"}}>0 = nenhuma dor</span>
      <span style={{color:C.textSoft,fontSize:11,fontStyle:"italic"}}>10 = pior dor imaginável</span>
    </div>
    <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
      {Array.from({length:11},(_,i)=>{
        const active=value===i;
        const bg=active?(i<=3?C.green0:i<=6?C.amber:C.red):C.bgCard;
        return <button key={i} onClick={()=>onChange(i)} style={{width:36,height:36,borderRadius:"50%",border:`1.5px solid ${active?bg:C.border}`,cursor:"pointer",fontWeight:700,fontSize:13,background:bg,color:active?C.white:C.textMid,transition:"all 0.15s"}}>{i}</button>
      })}
    </div>
  </div>
}

function CheckGroup({options,value=[],onChange,single=false}){
  const toggle=opt=>{
    if(single)onChange(value[0]===opt?[]:[opt]);
    else onChange(value.includes(opt)?value.filter(v=>v!==opt):[...value,opt]);
  };
  return <div style={{display:"flex",flexDirection:"column",gap:10,marginTop:10}}>
    {options.map(opt=><label key={opt} style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}>
      <div onClick={()=>toggle(opt)} style={{width:18,height:18,borderRadius:single?"50%":4,border:"2px solid",borderColor:value.includes(opt)?C.accent:C.border,background:value.includes(opt)?C.accent:"transparent",flexShrink:0,transition:"all 0.15s",display:"flex",alignItems:"center",justifyContent:"center"}}>
        {value.includes(opt)&&<div style={{width:7,height:7,borderRadius:single?"50%":2,background:C.white}}/>}
      </div>
      <span style={{color:C.textMid,fontSize:14}}>{opt}</span>
    </label>)}
  </div>
}

function CommentBox({value,onChange,placeholder="Comentários livres..."}){
  return <textarea value={value||""} onChange={e=>onChange(e.target.value)} rows={2} placeholder={placeholder} style={{marginTop:10,background:C.white,border:`1px solid ${C.border}`,borderRadius:6,color:C.textMid,padding:"8px 12px",fontSize:13,width:"100%",outline:"none",resize:"vertical",fontStyle:"italic",lineHeight:1.5}}/>
}

function Divider(){return <div style={{height:1,background:C.border,margin:"4px 0 24px"}}/>}

function Section({title,emoji,children}){
  return <div style={{marginBottom:24}}>
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
      <span style={{fontSize:15}}>{emoji}</span>
      <span style={{color:C.textSoft,fontSize:10,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",fontFamily:"'Courier New', monospace"}}>{title}</span>
    </div>
    {children}
  </div>
}

function SaveButton({onSave,saved}){
  return <div style={{marginTop:8}}>
    <button onClick={onSave} style={{background:saved?C.accent:C.bgDark,border:"none",borderRadius:8,color:C.white,padding:"15px",fontSize:14,fontWeight:600,cursor:"pointer",width:"100%",transition:"background 0.3s"}}>
      {saved?"✓ Salvo":"Salvar"}
    </button>
    <p style={{color:C.textSoft,fontSize:11,textAlign:"center",marginTop:10,fontStyle:"italic"}}>Não tente melhorar o diário. Só observe.</p>
  </div>
}

function ManhaForm({entry,onChange,onSave,saved}){
  const set=(k,v)=>onChange({...entry,[k]:v});
  return <div>
    <div style={{background:"#EFF5EF",border:`1px solid ${C.accentSoft}`,borderRadius:8,padding:"12px 14px",marginBottom:24}}>
      <p style={{color:C.accent,fontSize:12,margin:0,fontStyle:"italic"}}>Preencha logo ao acordar — ainda na cama, se possível.</p>
    </div>
    <Section title="Dor ao acordar" emoji="😣">
      <p style={{color:C.textMid,fontSize:13,marginBottom:4}}>Qual nota da sua dor agora?</p>
      <PainScale value={entry.dorAcordar} onChange={v=>set("dorAcordar",v)}/>
      <CommentBox value={entry.dorAcordarObs} onChange={v=>set("dorAcordarObs",v)}/>
    </Section>
    <Divider/>
    <Section title="Rigidez matinal" emoji="🌿">
      <p style={{color:C.textMid,fontSize:13,marginBottom:4}}>Como está a rigidez do corpo agora?</p>
      <PainScale value={entry.rigidez} onChange={v=>set("rigidez",v)}/>
      <CommentBox value={entry.rigidezObs} onChange={v=>set("rigidezObs",v)} placeholder="Ex: costas travadas, difícil virar na cama..."/>
    </Section>
    <Divider/>
    <Section title="Localização" emoji="📍">
      <p style={{color:C.textMid,fontSize:13,marginBottom:4}}>Onde está pior agora?</p>
      <CheckGroup options={locais} value={entry.localPior} onChange={v=>set("localPior",v)}/>
      <CommentBox value={entry.localPiorObs} onChange={v=>set("localPiorObs",v)}/>
    </Section>
    <Divider/>
    <Section title="O que ajudou" emoji="✨">
      <p style={{color:C.textMid,fontSize:13,marginBottom:4}}>O que ajudou a melhorar após acordar?</p>
      <CheckGroup options={ajudas} value={entry.ajudouMelhorar} onChange={v=>set("ajudouMelhorar",v)}/>
      <CommentBox value={entry.ajudouMelhorarObs} onChange={v=>set("ajudouMelhorarObs",v)} placeholder="Algo que não está na lista?"/>
    </Section>
    <SaveButton onSave={onSave} saved={saved}/>
  </div>
}

function NoiteForm({entry,onChange,onSave,saved}){
  const set=(k,v)=>onChange({...entry,[k]:v});
  return <div>
    <div style={{background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:8,padding:"12px 14px",marginBottom:24}}>
      <p style={{color:C.textMid,fontSize:12,margin:0,fontStyle:"italic"}}>Preencha antes de dormir, refletindo sobre o dia.</p>
    </div>
    <Section title="Tempo sentado" emoji="🪑">
      <p style={{color:C.textMid,fontSize:13,marginBottom:4}}>Ficou quanto tempo sentado sem levantar?</p>
      <CheckGroup single options={["Menos de 1h","1–2h","2–4h","Mais de 4h"]} value={entry.tempoSentado?[entry.tempoSentado]:[]} onChange={v=>set("tempoSentado",v[0]||null)}/>
      <CommentBox value={entry.tempoSentadoObs} onChange={v=>set("tempoSentadoObs",v)}/>
    </Section>
    <Divider/>
    <Section title="Movimentação" emoji="🚶">
      <p style={{color:C.textMid,fontSize:13,marginBottom:4}}>Como foi sua movimentação hoje?</p>
      <CheckGroup single options={["Pouco","Médio","Bastante"]} value={entry.movimentacao?[entry.movimentacao]:[]} onChange={v=>set("movimentacao",v[0]||null)}/>
      <CommentBox value={entry.movimentacaoObs} onChange={v=>set("movimentacaoObs",v)}/>
    </Section>
    <Divider/>
    <Section title="Atividade" emoji="🏃">
      <p style={{color:C.textMid,fontSize:13,marginBottom:4}}>Fez alguma atividade hoje?</p>
      <CheckGroup options={atividades} value={entry.atividade} onChange={v=>set("atividade",v)}/>
      <CommentBox value={entry.atividadeObs} onChange={v=>set("atividadeObs",v)}/>
    </Section>
    <Divider/>
    <Section title="Dor após movimento" emoji="📊">
      <p style={{color:C.textMid,fontSize:13,marginBottom:4}}>Como ficou a dor depois de se movimentar?</p>
      <CheckGroup single options={["Muito melhor","Melhor","Igual","Pior"]} value={entry.dorAposMov?[entry.dorAposMov]:[]} onChange={v=>set("dorAposMov",v[0]||null)}/>
      <CommentBox value={entry.dorAposMovObs} onChange={v=>set("dorAposMovObs",v)}/>
    </Section>
    <Divider/>
    <Section title="Medo de travar" emoji="⚡">
      <p style={{color:C.textMid,fontSize:13,marginBottom:4}}>Em algum momento teve medo de travar?</p>
      <CheckGroup single options={["Não","Sim"]} value={entry.medoTravar?[entry.medoTravar]:[]} onChange={v=>set("medoTravar",v[0]||null)}/>
      {entry.medoTravar==="Sim"&&<input type="text" placeholder="Em qual situação?" value={entry.medoSituacao||""} onChange={e=>set("medoSituacao",e.target.value)} style={{marginTop:10,background:C.white,border:`1px solid ${C.border}`,borderRadius:6,color:C.text,padding:"10px 14px",fontSize:14,width:"100%",outline:"none"}}/>}
      <CommentBox value={entry.medoTravarObs} onChange={v=>set("medoTravarObs",v)}/>
    </Section>
    <Divider/>
    <Section title="Dificuldades" emoji="⚠️">
      <p style={{color:C.textMid,fontSize:13,marginBottom:4}}>Hoje teve dificuldade para:</p>
      <CheckGroup options={dificuldades} value={entry.dificuldade} onChange={v=>set("dificuldade",v)}/>
      <CommentBox value={entry.dificuldadeObs} onChange={v=>set("dificuldadeObs",v)}/>
    </Section>
    <Divider/>
    <Section title="Dor agora" emoji="🌙">
      <p style={{color:C.textMid,fontSize:13,marginBottom:4}}>Qual nota da sua dor agora?</p>
      <PainScale value={entry.dorFimDia} onChange={v=>set("dorFimDia",v)}/>
      <CommentBox value={entry.dorFimDiaObs} onChange={v=>set("dorFimDiaObs",v)}/>
    </Section>
    <Divider/>
    <Section title="Janela sem dor" emoji="💭">
      <p style={{color:C.textMid,fontSize:13,marginBottom:4}}>Hoje teve algum momento que esqueceu da dor?</p>
      <CheckGroup single options={["Não","Sim"]} value={entry.esqueceuDor?[entry.esqueceuDor]:[]} onChange={v=>set("esqueceuDor",v[0]||null)}/>
      {entry.esqueceuDor==="Sim"&&<input type="text" placeholder="Fazendo o quê?" value={entry.esqueceuFazendo||""} onChange={e=>set("esqueceuFazendo",e.target.value)} style={{marginTop:10,background:C.white,border:`1px solid ${C.border}`,borderRadius:6,color:C.text,padding:"10px 14px",fontSize:14,width:"100%",outline:"none"}}/>}
      <CommentBox value={entry.esqueceuDorObs} onChange={v=>set("esqueceuDorObs",v)}/>
    </Section>
    <Divider/>
    <Section title="Melhor estratégia" emoji="🎯">
      <p style={{color:C.textMid,fontSize:13,marginBottom:4}}>O que fez você se sentir melhor por mais tempo hoje?</p>
      <textarea value={entry.melhorPorMais||""} onChange={e=>set("melhorPorMais",e.target.value)} rows={2} placeholder="Escreva aqui..." style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:6,color:C.text,padding:"10px 14px",fontSize:14,width:"100%",outline:"none",resize:"vertical",marginTop:8}}/>
    </Section>
    <Divider/>
    <Section title="Observações gerais" emoji="📝">
      <textarea value={entry.observacoes||""} onChange={e=>set("observacoes",e.target.value)} rows={3} placeholder="Qualquer coisa que queira registrar sobre o dia..." style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:6,color:C.text,padding:"10px 14px",fontSize:14,width:"100%",outline:"none",resize:"vertical",marginTop:8}}/>
    </Section>
    <SaveButton onSave={onSave} saved={saved}/>
  </div>
}

function SummaryView({allData,onBack}){
  const [summary,setSummary]=useState("");
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState("");
  const days=Object.keys(allData).sort();

  const generateSummary=async()=>{
    setLoading(true);setError("");setSummary("");
    const entriesText=days.map(day=>{
      const m=allData[day]?.manha||{};
      const n=allData[day]?.noite||{};
      return `Data: ${formatDate(day)}\nMANHÃ:\n- Dor ao acordar: ${m.dorAcordar??'—'}/10\n- Rigidez: ${m.rigidez??'—'}/10\n- Local pior: ${(m.localPior||[]).join(', ')||'—'}\n- O que ajudou: ${(m.ajudouMelhorar||[]).join(', ')||'—'}\nNOITE:\n- Tempo sentado: ${n.tempoSentado||'—'}\n- Movimentação: ${n.movimentacao||'—'}\n- Atividade: ${(n.atividade||[]).join(', ')||'—'}\n- Dor após movimento: ${n.dorAposMov||'—'}\n- Medo de travar: ${n.medoTravar||'—'}${n.medoSituacao?` — ${n.medoSituacao}`:''}\n- Dificuldades: ${(n.dificuldade||[]).join(', ')||'—'}\n- Dor fim do dia: ${n.dorFimDia??'—'}/10\n- Esqueceu a dor: ${n.esqueceuDor||'—'}${n.esqueceuFazendo?` — ${n.esqueceuFazendo}`:''}\n- Melhor por mais: ${n.melhorPorMais||'—'}`;
    }).join("\n\n---\n\n");
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:`Você é fisioterapeuta clínico especialista em dor musculoesquelética. Analise os dados de dor do Edmilson (${days.length} dias, dois registros por dia) e produza relatório com:\n1. RESUMO DO PERÍODO\n2. PADRÃO DE DOR\n3. RIGIDEZ MATINAL\n4. RESPOSTA AO MOVIMENTO\n5. SEDENTARISMO\n6. KINESIOFOBIA\n7. JANELAS SEM DOR\n8. ESTRATÉGIAS EFICAZES\n9. HIPÓTESES CLÍNICAS\n10. SUGESTÕES PARA PRÓXIMAS SESSÕES\n\nDADOS:\n${entriesText}`}]})});
      const data=await res.json();
      setSummary(data.content?.filter(b=>b.type==="text").map(b=>b.text).join("\n")||"");
    }catch(e){setError("Erro ao gerar resumo.");}
    setLoading(false);
  };

  const avgPain=(p,k)=>{const vals=days.map(d=>allData[d]?.[p]?.[k]).filter(v=>v!=null);if(!vals.length)return"—";return(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1)};

  return <div>
    <button onClick={onBack} style={{background:"none",border:"none",color:C.accent,cursor:"pointer",fontSize:14,marginBottom:20,padding:0}}>← Voltar ao diário</button>
    <h2 style={{color:C.text,fontSize:20,fontWeight:700,marginBottom:4,fontStyle:"italic"}}>Resumo Clínico</h2>
    <p style={{color:C.textSoft,fontSize:13,marginBottom:24,fontStyle:"italic"}}>{days.length} dia(s) registrado(s)</p>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:24}}>
      {[{label:"Dor\nacordar",value:`${avgPain("manha","dorAcordar")}/10`,color:C.amber},{label:"Rigidez\nmanhã",value:`${avgPain("manha","rigidez")}/10`,color:C.copper},{label:"Dor\nfim dia",value:`${avgPain("noite","dorFimDia")}/10`,color:C.accent},{label:"Medo\ntravar",value:`${days.filter(d=>allData[d]?.noite?.medoTravar==="Sim").length}/${days.length}`,color:C.red},{label:"Esqueceu\ndor",value:`${days.filter(d=>allData[d]?.noite?.esqueceuDor==="Sim").length}/${days.length}`,color:C.green0}].map(s=>
        <div key={s.label} style={{background:C.white,borderRadius:10,padding:"14px 12px",textAlign:"center",border:`1px solid ${C.border}`}}>
          <div style={{color:s.color,fontSize:20,fontWeight:800}}>{s.value}</div>
          <div style={{color:C.textSoft,fontSize:10,marginTop:4,whiteSpace:"pre-line",lineHeight:1.4}}>{s.label}</div>
        </div>
      )}
    </div>
    {!summary&&!loading&&<button onClick={generateSummary} style={{width:"100%",background:C.bgDark,border:"none",borderRadius:8,color:C.white,padding:"16px",fontSize:14,fontWeight:600,cursor:"pointer"}}>Gerar relatório clínico com IA ({days.length} dias)</button>}
    {loading&&<p style={{textAlign:"center",color:C.accent,fontStyle:"italic",padding:40}}>Analisando padrões clínicos...</p>}
    {error&&<p style={{color:C.red,textAlign:"center"}}>{error}</p>}
    {summary&&<div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:10,padding:20,fontSize:13,lineHeight:1.9,color:C.text,whiteSpace:"pre-wrap",marginTop:8}}>{summary}</div>}
  </div>
}

function App(){
  const [allData,setAllData]=useState(loadData);
  const [view,setView]=useState("diary");
  const [selectedDay,setSelectedDay]=useState(todayKey());
  const [periodo,setPeriodo]=useState("manha");
  const [saved,setSaved]=useState(false);

  const currentEntry=allData[selectedDay]?.[periodo]||(periodo==="manha"?{...defManha}:{...defNoite});

  const updateEntry=entry=>{
    const updated={...allData,[selectedDay]:{...allData[selectedDay],[periodo]:entry}};
    setAllData(updated);saveData(updated);
  };

  const handleSave=()=>{
    saveData(allData);setSaved(true);setTimeout(()=>setSaved(false),2500);
    const entry=allData[selectedDay]?.[periodo]||currentEntry;
    const payload=encodeURIComponent(JSON.stringify({data:selectedDay,periodo,...entry}));
    const img=new window.Image();
    img.src=SHEETS_URL+"?payload="+payload;
  };

  const days=Object.keys(allData).sort().reverse();
  const hasManha=day=>{const m=allData[day]?.manha;return m&&m.dorAcordar!=null};
  const hasNoite=day=>{const n=allData[day]?.noite;return n&&n.dorFimDia!=null};

  if(view==="summary") return <div style={{minHeight:"100vh",background:C.bg,padding:"24px 20px",maxWidth:520,margin:"0 auto"}}><SummaryView allData={allData} onBack={()=>setView("diary")}/></div>;

  return <div style={{minHeight:"100vh",background:C.bg}}>
    <div style={{padding:"18px 20px 14px",borderBottom:`1px solid ${C.border}`,position:"sticky",top:0,background:C.bg,zIndex:10}}>
      <div style={{maxWidth:520,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{color:C.textSoft,fontSize:9,letterSpacing:"0.18em",textTransform:"uppercase",fontFamily:"'Courier New', monospace"}}>Fernanda Hack · Fisioterapia</div>
          <div style={{color:C.text,fontSize:17,fontWeight:700,fontStyle:"italic"}}>Diário do Edmilson</div>
        </div>
        <div style={{display:"flex",gap:6}}>
          {["diary","history"].map(v=><button key={v} onClick={()=>setView(v)} style={{padding:"6px 11px",borderRadius:6,border:"1px solid",borderColor:view===v?C.accent:C.border,background:view===v?"#EFF5EF":"transparent",color:view===v?C.accent:C.textMid,fontSize:11,cursor:"pointer"}}>{v==="diary"?"Hoje":"Histórico"}</button>)}
          <button onClick={()=>setView("summary")} style={{padding:"6px 11px",borderRadius:6,border:`1px solid ${C.border}`,background:"transparent",color:C.copper,fontSize:11,cursor:"pointer"}}>Resumo IA</button>
        </div>
      </div>
    </div>
    <div style={{maxWidth:520,margin:"0 auto",padding:"20px"}}>
      {view==="history"?
        <div>
          <h3 style={{color:C.textSoft,fontSize:11,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:16}}>{days.length} dia(s) registrado(s)</h3>
          {days.length===0&&<p style={{color:C.textSoft,fontSize:14,textAlign:"center",marginTop:40,fontStyle:"italic"}}>Nenhum dia registrado ainda.</p>}
          {days.map(day=>{
            const m=allData[day]?.manha;const n=allData[day]?.noite;
            return <div key={day} onClick={()=>{setSelectedDay(day);setView("diary")}} style={{background:C.white,borderRadius:10,padding:"14px 16px",marginBottom:10,cursor:"pointer",border:`1px solid ${C.border}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{color:C.text,fontWeight:700,fontSize:14,fontStyle:"italic"}}>{formatDate(day)}</span>
                <div style={{display:"flex",gap:8,fontSize:11}}>
                  <span style={{color:hasManha(day)?C.accent:C.border}}>{hasManha(day)?"🌅 manhã":"○ manhã"}</span>
                  <span style={{color:hasNoite(day)?C.copper:C.border}}>{hasNoite(day)?"🌙 noite":"○ noite"}</span>
                </div>
              </div>
              <div style={{color:C.textSoft,fontSize:11,marginTop:6,display:"flex",gap:14}}>
                {m?.dorAcordar!=null&&<span style={{color:C.amber}}>↑ dor {m.dorAcordar}/10</span>}
                {m?.rigidez!=null&&<span style={{color:C.copper}}>rigidez {m.rigidez}/10</span>}
                {n?.dorFimDia!=null&&<span style={{color:C.accent}}>↓ dor {n.dorFimDia}/10</span>}
              </div>
            </div>
          })}
        </div>:
        <div>
          <div style={{display:"flex",gap:8,marginBottom:20}}>
            {[{key:"manha",label:"🌅 Manhã",done:hasManha(selectedDay)},{key:"noite",label:"🌙 Noite",done:hasNoite(selectedDay)}].map(p=>
              <button key={p.key} onClick={()=>setPeriodo(p.key)} style={{flex:1,padding:"12px",borderRadius:8,border:"1.5px solid",borderColor:periodo===p.key?C.accent:C.border,background:periodo===p.key?"#EFF5EF":C.white,color:periodo===p.key?C.accent:C.textMid,fontSize:13,fontWeight:600,cursor:"pointer"}}>
                {p.label}{p.done&&<span style={{marginLeft:6,color:C.green0,fontSize:11}}>✓</span>}
              </button>
            )}
          </div>
          {selectedDay!==todayKey()&&<button onClick={()=>setSelectedDay(todayKey())} style={{background:"none",border:"none",color:C.accent,cursor:"pointer",fontSize:12,padding:0,marginBottom:16}}>← Ir para hoje</button>}
          {periodo==="manha"?<ManhaForm entry={currentEntry} onChange={updateEntry} onSave={handleSave} saved={saved}/>:<NoiteForm entry={currentEntry} onChange={updateEntry} onSave={handleSave} saved={saved}/>}
        </div>
      }
    </div>
  </div>
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
